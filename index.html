<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRAME — Midjourney Prompt Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ── GATE ──────────────────────────────────────────────────────── -->
<div id="gate" style="position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;">
  <div style="width:100%;max-width:440px;padding:40px 32px;text-align:center;">

    <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:0.18em;color:#f0c05a;margin-bottom:4px;">FRAME</div>
    <div style="font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:#aaa;margin-bottom:36px;">by Archez International</div>

    <div style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:8px;">Enter your license key</div>
    <div style="font-size:12px;color:#777;margin-bottom:28px;line-height:1.6;">
      Find your key in the Gumroad receipt email<br>you received after purchase.
    </div>

    <input id="gateInput" type="text"
      placeholder="XXXXXXXX-XXXXXXXX-XXXXXXXX-XXXXXXXX"
      style="width:100%;padding:13px 16px;border:1.5px solid #ddd;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:13px;color:#1a1a1a;outline:none;text-align:center;letter-spacing:0.05em;margin-bottom:12px;transition:border-color 0.18s;box-sizing:border-box;"
      onkeydown="if(event.key==='Enter')unlockFRAME()"
      onfocus="this.style.borderColor='#f0c05a'"
      onblur="this.style.borderColor='#ddd'"
    />

    <button id="gateBtn" onclick="unlockFRAME()" style="width:100%;padding:13px;border-radius:8px;background:#1a1a1a;color:#fff;border:none;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;margin-bottom:16px;">
      Unlock FRAME
    </button>

    <div id="gateError" style="font-size:11px;color:#e05050;display:none;margin-bottom:12px;"></div>

    <div style="font-size:11px;color:#bbb;line-height:1.6;">
      Don't have a license key?
      <a href="https://archezinternational.gumroad.com" target="_blank" style="color:#f0c05a;text-decoration:none;font-weight:600;">Get the Midjourney Guide →</a>
    </div>
  </div>
</div>
<!-- ── END GATE ───────────────────────────────────────────────────── -->

<header>
  <div class="logo">FRAME <span>by Archez International</span></div>
  <button class="btn-ghost" onclick="resetAll()">Reset All</button>
</header>

<div class="app-shell">
  <div class="sidebar">
    <div class="sidebar-title">Templates</div>
    <div id="tplList"></div>
  </div>

  <div class="main-content">
    <div class="tpl-header" id="tplHeader"></div>
    <div class="stepper" id="stepper"></div>
    <div class="element-panel" id="elementPanel"></div>
    <div class="step-nav">
      <button class="nav-btn nav-back" id="btnBack" onclick="goBack()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <span class="step-counter" id="stepCounter"></span>
      <button class="nav-btn nav-next" id="btnNext" onclick="goNext()">
        Next
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div class="prompt-section">
      <div class="prompt-top">
        <div class="prompt-top-left">
          <span class="prompt-label">Your Prompt</span>
          <div class="p-dots" id="pDots"></div>
        </div>
      </div>
      <div class="prompt-body">
        <div class="prompt-text" id="promptText"></div>
      </div>
      <div class="prompt-actions">
        <button class="btn-copy" id="btnCopy" onclick="copyPrompt()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy Prompt
        </button>
        <button class="btn-clear" onclick="resetCurrent()">Clear</button>
        <div class="ar-wrap">
          <span class="ar-label">AR</span>
          <select class="ar-select" id="arSelect" onchange="buildPrompt()">
            <option value="1:1">1:1</option>
            <option value="16:9">16:9</option>
            <option value="4:5">4:5</option>
            <option value="2:3">2:3</option>
            <option value="3:2">3:2</option>
            <option value="4:3">4:3</option>
            <option value="21:9">21:9</option>
          </select>
        </div>
      </div>
    </div>
    <div class="example-block" id="exBlock"></div>
  </div>
</div>

<div class="toast" id="toast">Prompt copied!</div>

<script src="js/gate.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
