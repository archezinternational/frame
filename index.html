<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRAME — Midjourney Prompt Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f0c05a;
      --gold-dim: rgba(240,192,90,0.12);
      --gold-border: rgba(240,192,90,0.4);
      --bg: #ffffff;
      --bg-card: #f7f6f3;
      --bg-hover: #f0efeb;
      --text: #1a1a1a;
      --text-muted: #555550;
      --text-dim: #b0afa9;
      --border: rgba(0,0,0,0.09);
      --border-strong: rgba(0,0,0,0.16);
      --black: #1a1a1a;
      --radius: 10px;
      --t: 0.18s ease;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.18em;
      color: var(--gold);
    }
    .logo span {
      color: var(--text-dim);
      font-size: 10px;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.22em;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: 14px;
      vertical-align: middle;
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      transition: all var(--t);
    }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

    /* ── LAYOUT ── */
    .app-shell {
      display: grid;
      grid-template-columns: 248px 1fr;
      min-height: calc(100vh - 65px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 28px 0;
      position: sticky;
      top: 65px;
      height: calc(100vh - 65px);
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 22px 14px;
    }

    .tpl-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 22px;
      cursor: pointer;
      transition: all var(--t);
      border-left: 2px solid transparent;
    }
    .tpl-item:hover { background: var(--bg-hover); border-left-color: var(--gold-border); }
    .tpl-item.active { background: var(--gold-dim); border-left-color: var(--gold); }
    .tpl-item.active .tpl-num { color: var(--gold); }
    .tpl-item.active .tpl-name { color: var(--black); font-weight: 600; }

    .tpl-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      color: var(--text-dim);
      min-width: 20px;
      transition: color var(--t);
    }
    .tpl-name {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-muted);
      transition: color var(--t);
      line-height: 1.3;
    }

    /* ── MAIN ── */
    .main-content { padding: 36px 44px 48px; }

    /* Template header */
    .tpl-header { margin-bottom: 28px; }
    .tpl-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold-border);
      background: var(--gold-dim);
      border-radius: 4px;
      padding: 3px 9px;
      margin-bottom: 12px;
    }
    .tpl-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.04em;
      color: var(--black);
      margin-bottom: 6px;
    }
    .tpl-header p { font-size: 13px; color: var(--text-muted); }

    /* ── STEPPER ── */
    .stepper {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .step {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 3px;
      padding: 12px 8px;
      cursor: pointer;
      transition: all var(--t);
      border-right: 1px solid var(--border);
      background: var(--bg-card);
      position: relative;
    }
    .step:last-child { border-right: none; }
    .step:hover { background: var(--bg-hover); }

    .step.active {
      background: var(--black);
    }
    .step.done {
      background: var(--gold-dim);
    }

    .step-letter {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      transition: color var(--t);
      line-height: 1;
    }
    .step.active .step-letter { color: var(--gold); }
    .step.done .step-letter { color: var(--gold); }

    .step-name {
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color var(--t);
    }
    .step.active .step-name { color: rgba(255,255,255,0.7); }
    .step.done .step-name { color: var(--gold); }

    .step-check {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 14px;
      height: 14px;
      background: var(--gold);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .step-check svg { width: 8px; height: 8px; }
    .step.done .step-check { display: flex; }

    /* ── ELEMENT PANEL ── */
    .element-panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .panel-top {
      display: flex;
      align-items: center;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    .panel-letter {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--gold);
      background: var(--gold-dim);
      border-right: 1px solid var(--gold-border);
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      letter-spacing: 0.06em;
    }

    .panel-meta { flex: 1; padding: 0 20px; }
    .panel-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--black);
      letter-spacing: 0.02em;
    }
    .panel-sublabel { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .panel-body { padding: 20px; }

    /* Input */
    .input-wrap { position: relative; margin-bottom: 20px; }
    .el-input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border-strong);
      border-radius: 8px;
      padding: 11px 40px 11px 14px;
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 12.5px;
      outline: none;
      transition: border-color var(--t);
    }
    .el-input::placeholder { color: var(--text-dim); }
    .el-input:focus { border-color: var(--gold); }

    .input-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: none;
      transition: color var(--t);
      padding: 0 2px;
    }
    .input-clear:hover { color: var(--text-muted); }

    /* Chip groups */
    .chip-group { margin-bottom: 16px; }
    .chip-group:last-child { margin-bottom: 0; }
    .cg-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 9px;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }

    .chip {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border-strong);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--t);
      white-space: nowrap;
      user-select: none;
    }
    .chip:hover { border-color: var(--gold); color: var(--black); background: var(--gold-dim); }
    .chip.on { border-color: var(--black); color: #fff; background: var(--black); }

    /* ── STEP NAVIGATION ── */
    .step-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all var(--t);
    }

    .nav-back {
      background: var(--bg-card);
      color: var(--text-muted);
      border: 1px solid var(--border-strong);
    }
    .nav-back:hover:not(:disabled) { background: var(--bg-hover); color: var(--black); }
    .nav-back:disabled { opacity: 0.35; cursor: not-allowed; }

    .nav-next {
      background: var(--black);
      color: #fff;
    }
    .nav-next:hover { background: #333; transform: translateY(-1px); }
    .nav-next.finish { background: var(--gold); color: var(--black); }
    .nav-next.finish:hover { background: #e8b84a; transform: translateY(-1px); }

    .step-counter {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .step-counter strong { color: var(--black); }

    /* ── PROMPT ── */
    .prompt-section {
      border: 1.5px solid var(--gold-border);
      border-radius: var(--radius);
      background: var(--bg-card);
      overflow: hidden;
    }

    .prompt-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      border-bottom: 1px solid var(--gold-border);
      background: var(--gold-dim);
    }

    .prompt-top-left { display: flex; align-items: center; gap: 10px; }
    .prompt-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .p-dots { display: flex; gap: 5px; align-items: center; }
    .p-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background var(--t);
    }
    .p-dot.on { background: var(--gold); }

    .prompt-body { padding: 18px 20px; }
    .prompt-text {
      font-size: 13px;
      line-height: 1.75;
      color: var(--text);
      min-height: 52px;
      word-break: break-word;
    }
    .prompt-text .pt-empty { color: var(--text-dim); font-style: italic; }
    .prompt-text .pt-sep { color: var(--text-dim); margin: 0 1px; }
    .prompt-text .pt-ar { color: var(--gold); font-weight: 700; }

    .prompt-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 20px;
      border-top: 1px solid var(--border);
    }

    .btn-copy {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      background: var(--black);
      color: #fff;
      transition: all var(--t);
    }
    .btn-copy:hover { background: #333; transform: translateY(-1px); }
    .btn-copy.ok { background: #3d9e62; }

    .btn-clear {
      display: inline-flex;
      align-items: center;
      padding: 9px 16px;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--border-strong);
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      transition: all var(--t);
    }
    .btn-clear:hover { color: var(--black); border-color: var(--black); }

    .ar-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .ar-label {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-dim);
    }
    .ar-select {
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      outline: none;
      cursor: pointer;
      transition: border-color var(--t);
    }
    .ar-select:focus { border-color: var(--gold); }

    /* Example */
    .example-block {
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 15px 20px;
      background: var(--bg-card);
    }
    .ex-label {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 7px;
    }
    .ex-text { font-size: 12px; color: var(--text-muted); line-height: 1.6; font-style: italic; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--black);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.1em;
      padding: 12px 24px;
      border-radius: 8px;
      z-index: 1000;
      transition: transform 0.28s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      header { padding: 16px 20px; }
      .app-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: static; height: auto;
        border-right: none; border-bottom: 1px solid var(--border);
        padding: 16px 0; overflow-x: auto;
      }
      .sidebar > div:last-child { display: flex; overflow-x: auto; padding: 0 16px; gap: 0; }
      .tpl-item { min-width: max-content; border-left: none; border-bottom: 2px solid transparent; flex-direction: column; gap: 2px; padding: 8px 12px; }
      .tpl-item.active { border-bottom-color: var(--gold); border-left-color: transparent; }
      .main-content { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">FRAME <span>by Archez International</span></div>
  <button class="btn-ghost" onclick="resetAll()">Reset All</button>
</header>

<div class="app-shell">
  <div class="sidebar">
    <div class="sidebar-title">Templates</div>
    <div id="tplList"></div>
  </div>

  <div class="main-content">
    <div class="tpl-header" id="tplHeader"></div>
    <div class="stepper" id="stepper"></div>
    <div class="element-panel" id="elementPanel"></div>
    <div class="step-nav">
      <button class="nav-btn nav-back" id="btnBack" onclick="goBack()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <span class="step-counter" id="stepCounter"></span>
      <button class="nav-btn nav-next" id="btnNext" onclick="goNext()">
        Next
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div class="prompt-section">
      <div class="prompt-top">
        <div class="prompt-top-left">
          <span class="prompt-label">Your Prompt</span>
          <div class="p-dots" id="pDots"></div>
        </div>
      </div>
      <div class="prompt-body">
        <div class="prompt-text" id="promptText"></div>
      </div>
      <div class="prompt-actions">
        <button class="btn-copy" id="btnCopy" onclick="copyPrompt()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy Prompt
        </button>
        <button class="btn-clear" onclick="resetCurrent()">Clear</button>
        <div class="ar-wrap">
          <span class="ar-label">AR</span>
          <select class="ar-select" id="arSelect" onchange="buildPrompt()">
            <option value="1:1">1:1</option>
            <option value="16:9">16:9</option>
            <option value="4:5">4:5</option>
            <option value="2:3">2:3</option>
            <option value="3:2">3:2</option>
            <option value="4:3">4:3</option>
            <option value="21:9">21:9</option>
          </select>
        </div>
      </div>
    </div>
    <div class="example-block" id="exBlock"></div>
  </div>
</div>

<div class="toast" id="toast">Prompt copied!</div>

<script>

          { label:"Styles", chips:["hyperrealistic style","photorealistic render style","CGI architectural visualization","editorial architectural photography style","cinematic photography style","drone photography style","ultra-high-definition render style","3D visualization style","concept render style","long-exposure photography style","HDR photography style","digital painting style","night photography style","magazine photography style","documentary photography style","film photography style","large format photography style","high-contrast photography style","architectural photography style","aerial photography style","infrared photography style","motion-blur night photography style"] }
        ]
      }
    ]
  },
  {
    id:10, name:"Sketch & Line Render", defaultAr:"1:1",
    desc:"For images with sketch, hand-drawn or linear illustration aesthetic.",
    example:"Isometric view, contemporary house, minimalist style, white render and warm timber, minimal warm color accents, expressive loose ink linework style --ar 1:1",
    els:[
      { key:"F", label:"Focus", sub:"View type & space", ph:"e.g. Isometric view, contemporary house",
        groups:[
          { label:"Views", chips:["Isometric view","Floor plan top view","Site plan top view","Eye-level sketch perspective","Three-quarter sketch view","Section sketch view","Axonometric sketch view","Bird's eye sketch view"] },
          { label:"Spaces", chips:["contemporary house","urban plaza","architectural pavilion","cultural center","residential building","library","museum","mixed-use building","art gallery","train station","urban courtyard","beach pavilion","mountain refuge","community center","rooftop pavilion","luxury villa","brutalist apartment","glass tower","farmhouse","studio building","coastal cottage","hillside residence"] }
        ]
      },
      { key:"R", label:"Reference", sub:"Architectural style", ph:"e.g. minimalist style",
        groups:[
          { label:"Styles", chips:["contemporary","minimalist","brutalist","organic","industrial","futuristic","sculptural","deconstructivist","vernacular modern","raw concrete","high-tech","expressionist","biomorphic","post-modern","parametric","sustainable modern","mid-century modern","japandi","scandinavian","tropical modern","art deco","neoclassical sketch"] }
        ]
      },
      { key:"M", label:"Materials", sub:"Suggested materials", ph:"e.g. white render and warm timber",
        groups:[
          { label:"Combinations", chips:["white render and warm timber","raw concrete and glass","timber structure","concrete and steel","natural stone and timber","brick and concrete","glass and steel frame","rammed earth and timber","corten steel and glass","dark timber and stone","white plaster and wood","bamboo and glass","reclaimed timber and concrete","polished concrete and steel","limestone and timber frame","board-formed concrete and oak","zinc and timber","glass and raw concrete","terracotta and white plaster","dark brick and glass","stone and weathered timber","precast concrete and timber"] }
        ]
      },
      { key:"A", label:"Atmosphere", sub:"Suggested light", ph:"e.g. minimal warm color accents",
        groups:[
          { label:"Light & Tone", chips:["minimal warm color accents","soft natural light","dramatic side light","soft diffused light","abstract exploration of light and shadow","monochrome tonal study","pale washes of color","bold black ink and white","sepia toned","blue and white minimal color","single accent color highlight","warm ochre wash","gestural light suggestion","soft grey tones","high-contrast black and white","burnt sienna accent","cool blue wash","warm pencil tones","ink wash shadow","sparse color fields","hatching and cross-hatching tones","graphite monochrome"] }
        ]
      },
      { key:"E", label:"Expression", sub:"Visual style", ph:"e.g. expressive loose ink linework style",
        groups:[
          { label:"Styles", chips:["hand-drawn sketch style","pencil sketch style","line drawing style","ink and watercolor hybrid style","loose confident pencil lines quick architectural study style","expressive loose ink linework style","tight technical line drawing style","cross-hatching style","rapidograph line style","brushpen sketch style","charcoal sketch style","graphite shading style","marker sketch style","architectural croquis style","gestural sketch style","stippling style","construction line study style","expressive watercolor and ink style","field sketch style","architectural journal style","loose gouache and line style","digital sketch style"] }
        ]
      }
    ]
  }
];

/* ─── STATE ─────────────────────────────────────────────────────────── */
let tplIdx = 0;
let stepIdx = 0;
let vals = {};      // key → typed or auto-assembled string
let sel = {};       // key → Set of selected chip values

function initState(ti) {
  tplIdx = ti;
  stepIdx = 0;
  vals = {};
  sel = {};
  T[ti].els.forEach(el => { vals[el.key] = ''; sel[el.key] = new Set(); });
}

/* ─── RENDER ─────────────────────────────────────────────────────────── */
function renderSidebar() {
  document.getElementById('tplList').innerHTML = T.map((t, i) => `
    <div class="tpl-item ${i===tplIdx?'active':''}" onclick="selectTpl(${i})">
      <span class="tpl-num">${String(i+1).padStart(2,'0')}</span>
      <span class="tpl-name">${t.name}</span>
    </div>`).join('');
}

function renderHeader() {
  const t = T[tplIdx];
  document.getElementById('tplHeader').innerHTML = `
    <div class="tpl-tag">Template ${t.id} / ${T.length}</div>
    <h2>${t.name}</h2>
    <p>${t.desc}</p>`;
}

function renderStepper() {
  const t = T[tplIdx];
  document.getElementById('stepper').innerHTML = t.els.map((el, i) => {
    const done = i < stepIdx && vals[el.key];
    const active = i === stepIdx;
    const cls = active ? 'active' : (done ? 'done' : '');
    return `
      <div class="step ${cls}" onclick="jumpStep(${i})">
        <div class="step-check"><svg viewBox="0 0 10 8" fill="none" stroke="#1a1a1a" stroke-width="2"><polyline points="1 4 4 7 9 1"/></svg></div>
        <div class="step-letter">${el.key}</div>
        <div class="step-name">${el.label}</div>
      </div>`;
  }).join('');
}

function renderPanel() {
  const t = T[tplIdx];
  const el = t.els[stepIdx];
  const chips = sel[el.key];

  const groupsHTML = el.groups.map(g => `
    <div class="chip-group">
      <div class="cg-label">${g.label}</div>
      <div class="chips">
        ${g.chips.map(c => `
          <button class="chip ${chips.has(c)?'on':''}"
            onclick="toggleChip('${el.key}','${c.replace(/'/g,"\\'")}')">
            ${c}
          </button>`).join('')}
      </div>
    </div>`).join('');

  document.getElementById('elementPanel').innerHTML = `
    <div class="panel-top">
      <div class="panel-letter">${el.key}</div>
      <div class="panel-meta">
        <div class="panel-label">${el.label}</div>
        <div class="panel-sublabel">${el.sub}</div>
      </div>
    </div>
    <div class="panel-body">
      <div class="input-wrap">
        <input class="el-input" id="elInput"
          placeholder="${el.ph}"
          value="${vals[el.key].replace(/"/g,'&quot;')}"
          oninput="onType('${el.key}', this.value)" />
        <button class="input-clear" id="inputClear"
          onclick="clearEl('${el.key}')"
          style="display:${vals[el.key]?'block':'none'}">×</button>
      </div>
      ${groupsHTML}
    </div>`;
}

function renderNav() {
  const t = T[tplIdx];
  const last = stepIdx === t.els.length - 1;
  const el = t.els[stepIdx];

  document.getElementById('btnBack').disabled = stepIdx === 0;
  document.getElementById('stepCounter').innerHTML =
    `<strong>${stepIdx+1}</strong> of ${t.els.length} — ${el.label}`;

  const btn = document.getElementById('btnNext');
  if (last) {
    btn.classList.add('finish');
    btn.innerHTML = 'Done ✓';
  } else {
    btn.classList.remove('finish');
    btn.innerHTML = 'Next <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>';
  }
}

function renderPrompt() {
  const t = T[tplIdx];
  const ar = document.getElementById('arSelect').value;
  const parts = t.els.map(el => vals[el.key].trim()).filter(Boolean);

  // dots
  document.getElementById('pDots').innerHTML =
    t.els.map(el => `<div class="p-dot ${vals[el.key].trim()?'on':''}"></div>`).join('');

  const ptEl = document.getElementById('promptText');
  if (!parts.length) {
    ptEl.innerHTML = `<span class="pt-empty">Your prompt will appear here as you fill in the FRAME elements…</span>`;
  } else {
    const joined = parts.map(p=>`<span>${p}</span>`).join('<span class="pt-sep">, </span>');
    ptEl.innerHTML = joined + `<span class="pt-sep"> </span><span class="pt-ar">--ar ${ar}</span>`;
  }
}

function renderExample() {
  const t = T[tplIdx];
  document.getElementById('exBlock').innerHTML = `
    <div class="ex-label">Full Applied Example</div>
    <div class="ex-text">${t.example}</div>`;
}

function render() {
  renderSidebar();
  renderHeader();
  renderStepper();
  renderPanel();
  renderNav();
  renderPrompt();
  renderExample();
  document.getElementById('arSelect').value = T[tplIdx].defaultAr;
}

/* ─── INTERACTIONS ───────────────────────────────────────────────────── */
function selectTpl(i) {
  initState(i);
  render();
}

function jumpStep(i) {
  stepIdx = i;
  renderStepper();
  renderPanel();
  renderNav();
}

function goBack() {
  if (stepIdx > 0) { stepIdx--; renderStepper(); renderPanel(); renderNav(); }
}

function goNext() {
  const t = T[tplIdx];
  if (stepIdx < t.els.length - 1) {
    stepIdx++;
    renderStepper();
    renderPanel();
    renderNav();
  }
}

function toggleChip(key, val) {
  const s = sel[key];
  if (s.has(val)) s.delete(val); else s.add(val);
  vals[key] = [...s].join(', ');
  // sync input
  const inp = document.getElementById('elInput');
  if (inp) {
    inp.value = vals[key];
    document.getElementById('inputClear').style.display = vals[key] ? 'block' : 'none';
  }
  renderStepper();
  renderPanel();
  renderPrompt();
}

function onType(key, v) {
  vals[key] = v;
  sel[key].clear();
  document.getElementById('inputClear').style.display = v ? 'block' : 'none';
  renderStepper();
  // re-render chips to clear selections
  const t = T[tplIdx]; const el = t.els[stepIdx];
  if (el.key === key) {
    // just update chip classes without full re-render
    el.groups.forEach(g => g.chips.forEach(c => {
      const btn = [...document.querySelectorAll('.chip')].find(b=>b.textContent.trim()===c && b.closest('#elementPanel'));
      if(btn) btn.classList.toggle('on', sel[key].has(c));
    }));
  }
  renderPrompt();
}

function clearEl(key) {
  vals[key] = '';
  sel[key].clear();
  const inp = document.getElementById('elInput');
  if (inp) { inp.value = ''; }
  document.getElementById('inputClear').style.display = 'none';
  renderStepper();
  renderPanel();
  renderPrompt();
}

function resetCurrent() {
  initState(tplIdx);
  render();
}

function resetAll() { resetCurrent(); }

function buildPrompt() { renderPrompt(); }

function copyPrompt() {
  const t = T[tplIdx];
  const ar = document.getElementById('arSelect').value;
  const parts = t.els.map(el => vals[el.key].trim()).filter(Boolean);
  const text = parts.join(', ') + (parts.length ? ` --ar ${ar}` : '');
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.classList.add('ok');
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
    const t2 = document.getElementById('toast');
    t2.classList.add('show');
    setTimeout(()=>{ btn.classList.remove('ok'); btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy Prompt`; t2.classList.remove('show'); }, 2200);
  });
}

/* ─── INIT ───────────────────────────────────────────────────────────── */
initState(0);
render();
</script>
</body>
</html>
